# Generated by `tidal init`.
# Secrets belong in .env, not here.
# Relative paths in this file resolve from the directory containing config.yaml.

# CLI client defaults: API endpoint defaults for `tidal`.
tidal_api_base_url: https://api.tidal.wavey.info
tidal_api_request_timeout_seconds: 30

# Shared execution defaults: used by local preview/broadcast and server-side execution.
auction_kicker_address: "0x846475a1B97AC57861813206749c1b0f592383eF"
txn_usd_threshold: 100
txn_max_base_fee_gwei: 0.5
txn_max_priority_fee_gwei: 2
txn_max_gas_limit: 500000
txn_start_price_buffer_bps: 1000
txn_min_price_buffer_bps: 500
txn_quote_spot_warning_threshold_pct: 2
txn_max_data_age_seconds: 6000
txn_cooldown_seconds: 3600
txn_require_curve_quote: true
max_batch_kick_size: 5
batch_kick_delay_seconds: 5

# Shared runtime: used by both the CLI client and the server operator.
db_path: state/tidal.db
chain_id: 1
rpc_timeout_seconds: 10
rpc_retry_attempts: 3

# Server operator only: scanner and cached state refresh.
scan_interval_seconds: 300
scan_concurrency: 20
scan_auto_settle_enabled: false
monitored_fee_burners:
  - address: "0xb911Fcce8D5AFCEc73E072653107260bb23C1eE8"
    want_address: "0xf939e0a03fb07f59a73314e73794be0e57ac1b4e"
    label: "yCRV Fee Burner"

# Server operator only: on-chain discovery and pricing refresh.
multicall_enabled: true
multicall_address: "0xca11bde05977b3631167028862be2a173976ca11"
multicall_discovery_batch_calls: 800
multicall_rewards_batch_calls: 500
multicall_rewards_index_max: 16
multicall_balance_batch_calls: 1000
multicall_overflow_queue_max: 32
multicall_auction_batch_calls: 100
auction_factory_address: "0xbA7FCb508c7195eE5AE823F37eE2c11D7ED52F8e"
price_refresh_enabled: true
token_price_agg_base_url: https://prices.wavey.info
price_timeout_seconds: 10
price_retry_attempts: 3
price_concurrency: 10
price_delay_seconds: 0
auctionscan_base_url: https://auctionscan.info
auctionscan_api_base_url: https://auctionscan.info/api
auctionscan_recheck_seconds: 90

# Server operator only: API server bind and reconciliation settings.
tidal_api_host: "0.0.0.0"
tidal_api_port: 8787
tidal_api_receipt_reconcile_interval_seconds: 30
tidal_api_receipt_reconcile_threshold_seconds: 60
tidal_api_cors_allowed_origins: []
